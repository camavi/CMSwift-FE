    const iconModes = {
      None: "both",

    const gradientValues = [true, true, -90, 90, 1, 25, -25, 270, true];
    const serializeValue = (value) =>
      typeof value === "string" ? `"${value}"` : String(value);

    const serializeOptions = (options) => {
      const entries = Object.entries(options).filter(([key, value]) => value);
      //remove la class
      entries.splice(
        entries.findIndex(([key]) => key === "class"),
        1,
      );
      return entries
        .map(([key, value]) => `${key}: ${serializeValue(value)}`)
        .join(", ");
    };

    const getIconOptions = (theme, mode = "left") => {
      const options = {};
      if (mode === "left" || mode === "both") options.icon = theme.icon;
      if (mode === "right" || mode === "both")
        options.iconRight = theme.iconRight;
      return options;
    };

    const makeOptions = (theme, extraOptions = {}, mode = "left") => {
      const options = {};

      if (theme.color) options.color = theme.color;

      Object.assign(options, getIconOptions(theme, mode), extraOptions);

      return options;
    };

    const boxCode = (title, content, numCol = 12) => {
      const openCode = _.rod(false);
      return _.Card(

                },
                content.sample.join("\n"),
              ),
            ),
          ),
        ),
      );
    };

    const demoImportBase = new URL("/demo/", window.location.origin);
    const demoRouteMap = new Map(
      demoRoutes.map(([route, modulePath, exportName]) => [
        route,
        {
          moduleUrl: new URL(modulePath, demoImportBase).href,
          exportName,
        },
      ]),
    );
    const demoViewCache = new Map();

    function loadDemoView(route) {
      const entry = demoRouteMap.get(route);
      if (!entry) return Promise.resolve(null);

      if (!demoViewCache.has(route)) {
        demoViewCache.set(
          route,
          import(entry.moduleUrl).then((module) => {
            const view = module[entry.exportName];
            if (view == null) {
              throw new Error(`Demo export non valida: ${entry.exportName}`);
            }
            return view;
          }),
        );
      }

      return demoViewCache.get(route);
    }

    function preloadDemoView(route) {
      if (!demoRouteMap.has(route)) return;
      loadDemoView(route).catch(() => {});
    }

    function createLazyDemoRoute(route) {
      return (ctx) => {
        const host = _.div({ class: "cms-p-md" }, "Loading...");

        loadDemoView(route)
          .then((view) => {
            if (!host.isConnected) return;
            _.mount(host, typeof view === "function" ? () => view(ctx) : view, {
              clear: true,
            });
            requestAnimationFrame(() => hljs.highlightAll());
          })
          .catch((error) => {
            console.error(`[demo] load failed for ${route}`, error);
            if (!host.isConnected) return;
            _.mount(
              host,
              _.Banner({
                color: "danger",
                title: "Errore nel caricamento",
                message: `Impossibile caricare ${route}`,
              }),
              { clear: true },
            );
          });

        return host;
      };
    }

    function layoutPage(
      _content = null,
      _header = null,
      _drawer = null,
      _footer = null,
    ) {
      const header =
        _header ||
        _.Header({
          title: "CMSwift",
          subtitle: "Demo componenti UI",
          right: _.Toolbar(
            _.Btn(
              {
                icon: "#bell",
                onClick: () => _.Notify.info("Hai nuove notifiche"),
              },
              "Notifiche",
            ),
            _.Btn(
              {
                variant: "primary",
                icon: "#plus",
                onClick: () => {
                  drawerOpen.value = false;
                  _.Notify.info("Nuovo elemento");
                  CMSwift.router.navigate("/demo/component/card");
                },
              },
              "Nuovo",
            ),
          ),
        });
      const content =
        _content ||
        _.Container(
          _.div(
            { style: { margin: "16px 0" } },
            _.h2("CMSwift UI Kit"),
            _.p("Tutti i componenti in azione su una singola pagina."),
          ),
        );
      const drawer =
        _drawer ||
        _.Drawer({
          stateKey: "demo:drawer",
          header: _.h3({ class: "cms-t-center" }, "Menu principale"),
          items: [
            { label: "Home", to: "/demo", icon: "home" },
            ...componentItems,
          ],
        });
      const footer =
        _footer ||
        _.Footer(
          _.div(
            "CMSwift UI Demo • Layout completo con componenti attivi",
            _.Icon({ textColor: "red", name: "#heart" }),
          ),
        );

      const drawerOpen = _.rod(true);

      currentLayout = _.Layout({
        header: header,
        aside: drawer,
        page: content,
        footer: footer,
        drawerOpen: drawerOpen,
        tagPage: true,
      });

      return currentLayout;
    }
    let contentPage = _.div("Start");
    const layoutApp = layoutPage(contentPage);
    _.mount("#app", layoutApp);
    _.router.setOutlet(contentPage);

    //CMSwift.router.add("/demo", () => page.home());

      _.router.add(route, createLazyDemoRoute(route));
    }

    preloadDemoView(window.location.pathname);
    _.router.start();
