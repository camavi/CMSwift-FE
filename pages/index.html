<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMSwift UI Demo</title>
    <link rel="stylesheet" href="/_cmswift-fe/css/base.css" />
    <link rel="stylesheet" href="/_cmswift-fe/css/responsive.css" />
    <link rel="stylesheet" href="/_cmswift-fe/css/ui.css" />
    <link rel="stylesheet" href="/_cmswift-fe/css/animation.css" />
    <link rel="stylesheet" href="/_cmswift-fe/css/tabler-icons-out.css" />
    <script src="/config-fe/setting.js"></script>
    <script src="/_cmswift-fe/js/cms.js"></script>
    <script src="/_cmswift-fe/js/ui.js"></script>
    <style>
      body {
        margin: 0;
        background: var(--cms-bg);
        color: var(--cms-text);
        font-family: var(--cms-font);
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
  </body>
  <script>
    CMSwift.ready(() => {
      const title = _.rod("Landing Demo");
      const published = _.rod(true);
      const visibility = _.rod("public");
      const featured = _.rod(false);
      const completion = _.rod(62);

      const progress = _.Progress({ value: completion.value });
      const progressLabel = _.span(
        { class: "cms-muted" },
        `${completion.value}%`,
      );
      completion.action((v) => {
        progress.querySelector(".cms-progress-bar").style.width = `${v}%`;
        progressLabel.textContent = `${v}%`;
      });

      const statusLine = _.div(
        { class: "cms-muted", style: { marginTop: "10px" } },
        "",
      );
      const updateStatus = () => {
        statusLine.textContent = `Titolo: ${title.value} • Pubblicato: ${
          published.value ? "si" : "no"
        } • Visibilità: ${visibility.value} • In evidenza: ${
          featured.value
        } • Avanzamento: ${completion.value}%`;
      };
      [title, published, visibility, featured, completion].forEach((r) =>
        r.action(updateStatus),
      );
      updateStatus();

      const dialog = _.Dialog({
        title: "Dialog di esempio",
        content: () => _.div("Questo dialog conferma l'uso di _.Dialog. 🤩"),
        actions: ({ close }) => [
          _.Btn({ onClick: close }, "Chiudi"),
          _.Btn({ variant: "primary", onClick: close }, "Conferma"),
        ],
      });

      const navCard = _.Card(
        _.h3("Layout e navigazione"),
        _.Breadcrumbs({
          items: [
            { label: "Home", to: "#" },
            { label: "UI" },
            { label: "Demo" },
          ],
        }),
        _.div(
          { style: { marginTop: "12px" } },
          _.Toolbar(
            _.Btn({ icon: "#home", iconAlign: "right" }, "Dashboard"),
            _.Btn({ icon: "#search" }, "Cerca"),
            _.Btn({ variant: "primary", icon: "#plus" }, "Nuovo"),
          ),
        ),
      );

      const interactiveCard = _.Card(
        _.h3("Elementi interattivi"),
        _.div(
          {
            class: "cms-row",
            style: { gap: "var(--cms-s-sm)", flexWrap: "wrap" },
          },
          _.Btn({ variant: "primary" }, "Primario"),
          _.Btn({ variant: "success" }, "Successo"),
          _.Btn({ variant: "danger" }, "Pericolo"),
          _.Btn({ outline: true }, "Outline"),
        ),
        _.div(
          {
            class: "cms-row",
            style: {
              marginTop: "12px",
              gap: "var(--cms-s-md)",
              alignItems: "center",
              flexWrap: "wrap",
            },
          },
          _.Input({ placeholder: "Titolo pagina", model: title }),
          _.Checkbox({ label: "Pubblicato", model: published }),
          _.Toggle({ label: "In evidenza", model: featured }),
        ),
        _.div(
          {
            class: "cms-row",
            style: {
              marginTop: "12px",
              gap: "var(--cms-s-md)",
              alignItems: "center",
              flexWrap: "wrap",
            },
          },
          _.Radio({
            name: "vis",
            value: "public",
            label: "Pubblico",
            model: visibility,
          }),
          _.Radio({
            name: "vis",
            value: "private",
            label: "Privato",
            model: visibility,
          }),
          _.div(
            { style: { minWidth: "170px" } },
            _.Slider({ min: 0, max: 100, model: completion }),
          ),
          progress,
          progressLabel,
        ),
        statusLine,
      );

      const infoList = _.List(
        _.Item({}, "Dashboard"),
        _.Item({}, "Articoli"),
        _.Item({}, "Media"),
        _.Item({}, "Impostazioni"),
      );

      const dataCard = _.Card(
        _.h3("Dati e visualizzazione"),
        _.div(
          {
            class: "cms-row",
            style: {
              gap: "var(--cms-s-sm)",
              alignItems: "center",
              flexWrap: "wrap",
            },
          },
          _.Avatar({ label: "CM", size: 40 }),
          _.Badge({ label: "New" }),
          _.Chip({
            label: "Marketing",
            removable: true,
            onRemove: () => _.Notify.info("Tag rimosso"),
          }),
          _.Chip({ label: "Design" }),
        ),
        _.div({ style: { marginTop: "12px" } }, infoList),
      );

      const rows = [
        {
          id: 1,
          title: "Homepage",
          status: "Published",
          updated: "2024-07-18",
        },
        { id: 2, title: "Chi siamo", status: "Draft", updated: "2024-07-16" },
        {
          id: 3,
          title: "Contatti",
          status: "Published",
          updated: "2024-07-11",
        },
        { id: 4, title: "Blog", status: "Archived", updated: "2024-06-30" },
        {
          id: 5,
          title: "Landing Prodotto",
          status: "Draft",
          updated: "2024-06-25",
        },
      ];

      const table = _.Table({
        columns: [
          { key: "title", label: "Pagina", sortable: true },
          {
            key: "status",
            label: "Stato",
            sortable: true,
            render: (row) =>
              _.Badge({
                label: row.status,
                color:
                  row.status === "Published"
                    ? "var(--cms-success)"
                    : "var(--cms-primary)",
              }),
          },
          { key: "updated", label: "Aggiornato", sortable: true },
        ],
        rows,
        pageSize: 5,
        actions: (row) =>
          _.Btn(
            {
              outline: true,
              onClick: () => _.Notify.info(`Apri: ${row.title}`),
            },
            "Apri",
          ),
      });

      const notifyCard = _.Card(
        _.h3("Notifiche e feedback"),
        _.div(
          {
            class: "cms-row",
            style: { gap: "var(--cms-s-sm)", flexWrap: "wrap" },
          },
          _.Btn({ onClick: () => dialog.open() }, "Apri dialog"),
          _.Btn(
            {
              onClick: () => _.Notify.success("Operazione completata"),
            },
            "Notify success",
          ),
          _.Btn(
            {
              onClick: () => _.Notify.error("Si è verificato un errore"),
            },
            "Notify error",
          ),
        ),
        _.div(
          {
            class: "cms-row",
            style: {
              marginTop: "12px",
              gap: "var(--cms-s-sm)",
              alignItems: "center",
            },
          },
          _.Spinner({ size: 22 }),
          _.span("Caricamento in corso"),
        ),
      );

      const parallax = _.Parallax(
        { height: "320px", startTop: 105 },
        _.div(
          _.h2({ style: { margin: 0 } }, "CMSwift UI Kit"),
          _.p(
            { style: { margin: "6px 0 0" } },
            "Tutti i componenti in azione su una singola pagina.",
          ),
        ),
      );

      const page = _.Page(
        _.Container(
          parallax,
          _.div(
            { style: { margin: "16px 0" } },
            _.Breadcrumbs({
              items: [{ label: "Home", to: "#" }, { label: "Demo componenti" }],
            }),
          ),
          _.Grid(
            { gap: "var(--cms-s-lg)" },
            _.GridCol({ span: 24, sm: 24, class: "cms-m-b-sm" }, navCard),
            _.GridCol(
              { span: 24, sm: 24, class: "cms-m-b-sm" },
              interactiveCard,
            ),
            _.GridCol({ span: 24, sm: 24, class: "cms-m-b-sm" }, dataCard),
            _.GridCol({ span: 24, sm: 24, class: "cms-m-b-sm" }, notifyCard),
            _.GridCol({ span: 24, sm: 24, class: "cms-m-b-sm" }, table),
            _.GridCol({ span: 24 }, CMSwift.docTable("Btn")),
          ),
        ),
      );

      const header = _.Header({
        title: "CMSwift",
        subtitle: "Demo componenti UI",
        right: _.Toolbar(
          _.Btn(
            {
              icon: "#bell",
              onClick: () => _.Notify.info("Hai nuove notifiche"),
            },
            "Notifiche",
          ),
          _.Btn(
            { variant: "primary", icon: "#plus", onClick: () => dialog.open() },
            "Nuovo",
          ),
        ),
      });

      const drawer = _.Drawer({
        stateKey: "demo:drawer",
        header: _.Banner({ message: "Menu principale" }),
        items: [
          { label: "Home", to: "/", icon: "🏠" },
          { label: "Blog", to: "/blog", icon: "📰" },
          {
            label: "Gestione",
            icon: "🧰",
            iconPosition: "right",
            expanded: true,
            items: [
              { label: "Utenti", to: "/users" },
              {
                label: "Impostazioni",
                icon: "⚙️",
                iconSidePosition: "right",
                openIcon: _.Icon("#minus"),
                closeIcon: _.Icon("#plus"),
                items: [
                  { label: "Generali", to: "/settings/general" },
                  { label: "Billing", to: "/settings/billing" },
                ],
              },
            ],
          },
          {
            label: "Docs esterne",
            href: "https://example.com/docs",
            icon: "🔗",
            external: true,
          },
          {
            label: "Nuovo contenuto",
            icon: "➕",
            button: true,
            onClick: () => _.Notify.success("Azione eseguita"),
          },
        ],
      });

      const footer = _.Footer(
        _.div(
          "CMSwift UI Demo • Layout completo con componenti attivi",
          _.Icon({ textColor: "red", name: "#heart" }),
        ),
      );

      CMSwift.mount(
        "#app",
        _.Layout({
          header,
          aside: drawer,
          page,
          footer,
        }),
      );
    });
  </script>
</html>
