    const buttonThemeMap = Object.fromEntries(
      listThemes.map((theme) => [theme.label, theme]),

    const sizeConfigs = [
      { theme: "Success", label: "Success xxs", size: "xxs" },
      { theme: "Success", label: "Success xs", size: "xs" },
      { theme: "Warning", label: "Warning sm", size: "sm" },
      { theme: "Danger", label: "Danger md", size: "md" },
      { theme: "Info", label: "Info lg", size: "lg" },
      { theme: "Primary", label: "Primary xl", size: "xl" },
      { theme: "Secondary", label: "Secondary xxl", size: "xxl" },
    ];

    const iconModes = {
      None: "both",
      Success: "both",
      Warning: "right",
      Danger: "both",
      Info: "both",
      Primary: "both",
      Secondary: "both",
      Dark: "both",
      Light: "both",
    };

    const gradientValues = [true, true, -90, 90, 1, 25, -25, 270, true];
    const serializeValue = (value) =>
      typeof value === "string" ? `"${value}"` : String(value);

    const serializeOptions = (options) => {
      const entries = Object.entries(options).filter(([key, value]) => value);
      //remove la class
      entries.splice(
        entries.findIndex(([key]) => key === "class"),
        1,
      );
      return entries
        .map(([key, value]) => `${key}: ${serializeValue(value)}`)
        .join(", ");
    };

    const getIconOptions = (theme, mode = "left") => {
      const options = {};
      if (mode === "left" || mode === "both") options.icon = theme.icon;
      if (mode === "right" || mode === "both")
        options.iconRight = theme.iconRight;
      return options;
    };

    const makeOptions = (theme, extraOptions = {}, mode = "left") => {
      const options = {};

      if (theme.color) options.color = theme.color;

      Object.assign(options, getIconOptions(theme, mode), extraOptions);

      return options;
    };

    const boxCode = (title, content, numCol = 12) => {
      const openCode = _.rod(false);
      return _.Card(
        {
          class: "cms-m-t-sm",
          //gradient: true,
          identifier: title,
          header: [
            _.Spacer(),
            _.Btn({
              icon: "code",
              class: "cms-m-l-auto",
              dense: true,
              onClick: () => {
                openCode.value = !openCode.value;
              },
            }),
            _.Btn({
              icon: "#brand-github",
              class: "cms-m-l-auto",
              dense: true,
            }),
            _.Btn({
              icon: "#brand-codepen",
              class: "cms-m-l-auto",
              dense: true,
            }),
          ],
        },
        _.Row(
          _.Col({ class: "cms-gutter-sm", col: numCol }, content.code),
          _.Col(
            {
              col: 24,
              class: "cms-scroll-locked",
              style: {
                height: () => (openCode.value ? "fit-content" : "0px"),
              },
            },
            _.pre(
              _.code(
                {
                  class: "cms-r-md language-javascript",
                },
                content.sample.join("\n"),
              ),
            ),
          ),
        ),
      );
    };
